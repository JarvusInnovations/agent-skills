# Jarvus house dbt/sqlfluff pre-commit hooks — merge into .pre-commit-config.yaml.
# YAML anchors define lint / fix / lint-ci from one base. ADAPT: dialect, the dbt dir
# in `files:`, and the pinned adapter versions in additional_dependencies.
repos:
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.4.1                       # ADAPT: pin to current
    hooks:
      - &sqlfluff_base
        id: sqlfluff-lint
        name: sqlfluff-lint
        args: ["--config", "pyproject.toml", "--dialect", "duckdb"]   # ADAPT dialect
        files: ^warehouse/.*\.sql$   # ADAPT path
        additional_dependencies:
          - "sqlfluff-templater-dbt==3.4.1"
          - "dbt-core==1.10.13"
          - "dbt-duckdb==1.9.3"      # ADAPT: dbt-bigquery for BigQuery, etc.
          # - "<your-custom-sqlfluff-rules-plugin>"   # if using custom rules
      - <<: *sqlfluff_base
        id: sqlfluff-fix
        name: sqlfluff-fix
      - <<: *sqlfluff_base           # CI variant: GitHub inline annotations
        id: sqlfluff-lint
        alias: sqlfluff-lint-ci
        name: sqlfluff-lint-ci
        args:
          - "--config"
          - "pyproject.toml"
          - "--dialect"
          - "duckdb"                 # ADAPT dialect
          - "--format"
          - "github-annotation-native"
          - "--annotation-level"
          - "failure"
        stages: [manual]

  # Optional: model-metadata rules (orthogonal to SQL text).
  # - repo: https://github.com/dbt-checkpoint/dbt-checkpoint
  #   rev: v2.0.6
  #   hooks:
  #     - id: check-model-has-tests
  #     - id: check-model-has-description
